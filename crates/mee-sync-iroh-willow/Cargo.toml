[package]
name = "mee-sync-iroh-willow"
version = "0.1.0"
edition = "2021"
description = "Willow/iroh implementation of mee-sync-api"

[dependencies]
mee-sync-api = { path = "../mee-sync-api" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures-core = "0.3"
futures-util = "0.3"
iroh = "0.96.1"
iroh-blobs = "0.98"
iroh-willow = { git = "https://github.com/MeeFoundation/iroh-willow.git", branch = "willow-experiments-iroh-0.96" }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
data-encoding = "2.6"
async-stream = "0.3"
hex = "0.4"

[lints]
workspace = true
