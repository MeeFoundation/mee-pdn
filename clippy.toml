# Clippy configuration
# https://doc.rust-lang.org/clippy/lint_configuration.html

# Allow unwrap/expect/indexing/print/dbg in test code
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-indexing-slicing-in-tests = true
allow-print-in-tests = true
allow-dbg-in-tests = true

# Complexity
cognitive-complexity-threshold = 15
too-many-lines-threshold = 80

# Don't require docs on private items
check-private-items = false

# Large future threshold
future-size-threshold = 8192
