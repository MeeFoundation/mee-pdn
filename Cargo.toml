[workspace]
members = [
  "crates/mee-did-api", # DID provider api & types
  "crates/mee-did-key", # stub did:key provider
  "crates/mee-local-store-api", # namespaced KV store api & types
  "crates/mee-local-store-mem", # KV store - in-memory backend
  "crates/mee-node-api", # node api & types
  "crates/mee-wasm", # minimal wasm facade (wasm-bindgen)
  "crates/mee-types", # shared domain types
  "crates/mee-sync-api", # backend-agnostic sync engine API
  "crates/mee-sync-iroh-willow", # iroh/willow sync engine
  "crates/mee-node-demo-impl", # demo Node implementation (iroh, willow, mem kv store)
  "crates/mee-demo", # demo node + axum surface
]
resolver = "2"

[patch.crates-io]
willow-data-model = { git = "https://github.com/n0-computer/willow-rs.git", branch = "main" }
willow-encoding = { git = "https://github.com/n0-computer/willow-rs.git", branch = "main" }
meadowcap = { git = "https://github.com/n0-computer/willow-rs.git", branch = "main" }
